<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教會行事曆管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #48bb78;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .event-list {
            margin-top: 20px;
        }

        .event-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .event-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .event-header {
            display: grid;
            grid-template-columns: 200px 1fr 200px 100px;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input,
        .input-group select {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .sub-items {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e2e8f0;
        }

        .sub-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .sub-item-row {
            display: grid;
            grid-template-columns: 150px 200px 1fr 80px;
            gap: 15px;
            align-items: center;
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .toggle-sub {
            background: #4299e1;
            margin-top: 10px;
        }

        .toggle-sub:hover {
            background: #3182ce;
        }

        textarea {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .event-header,
            .sub-item-row {
                grid-template-columns: 1fr;
            }
        }

        /* 批量新增對話框樣式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 25px 30px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #718096;
            cursor: pointer;
            padding: 0;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #f7fafc;
            color: #e53e3e;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 2px solid #e2e8f0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .weekday-selector {
            margin-bottom: 25px;
        }

        .section-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .weekday-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .weekday-btn {
            padding: 12px 20px;
            border: 2px solid #cbd5e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
            transition: all 0.2s;
            min-width: 50px;
        }

        .weekday-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .weekday-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .preview-section {
            margin-top: 25px;
        }

        .date-preview {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.8;
            color: #4a5568;
        }

        .date-preview.has-dates {
            background: #e6fffa;
            border-color: #81e6d9;
        }

        .preview-count {
            font-weight: 600;
            color: #319795;
            margin-bottom: 10px;
        }

        .preview-date-item {
            padding: 5px 10px;
            margin: 3px 0;
            background: white;
            border-radius: 5px;
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .weekday-buttons {
                justify-content: space-between;
            }
            
            .weekday-btn {
                flex: 1;
                min-width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 教會行事曆管理系統</h1>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="addEvent()">➕ 新增聚會</button>
            <button class="btn btn-primary" onclick="openBatchModal()">📅 批量新增</button>
            <button class="btn btn-success" onclick="exportToExcel()">📊 匯出 Excel</button>
            <button class="btn btn-primary" onclick="saveToGAS()">💾 儲存到雲端</button>
            <button class="btn btn-primary" onclick="loadFromGAS()">📥 從雲端載入</button>
        </div>

        <div id="eventList" class="event-list"></div>
    </div>

    <!-- 批量新增對話框 -->
    <div id="batchModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📅 批量新增聚會</h2>
                <button class="btn-close" onclick="closeBatchModal()">✕</button>
            </div>
            
            <div class="modal-body">
                <div class="form-grid">
                    <div class="input-group">
                        <label>開始日期 *</label>
                        <input type="date" id="batchStartDate" required>
                    </div>
                    
                    <div class="input-group">
                        <label>結束日期 *</label>
                        <input type="date" id="batchEndDate" required>
                    </div>
                    
                    <div class="input-group">
                        <label>聚會名稱</label>
                        <input type="text" id="batchName" placeholder="例：主日崇拜">
                    </div>
                    
                    <div class="input-group">
                        <label>聚會類別</label>
                        <select id="batchCategory">
                            <option>主日崇拜</option>
                            <option>禱告會</option>
                            <option>小組聚會</option>
                            <option>特別聚會</option>
                            <option>服事</option>
                            <option>其他</option>
                        </select>
                    </div>
                </div>
                
                <div class="weekday-selector">
                    <label class="section-label">選擇星期 * (可多選)</label>
                    <div class="weekday-buttons">
                        <button type="button" class="weekday-btn" data-day="0" onclick="toggleWeekday(0)">日</button>
                        <button type="button" class="weekday-btn" data-day="1" onclick="toggleWeekday(1)">一</button>
                        <button type="button" class="weekday-btn" data-day="2" onclick="toggleWeekday(2)">二</button>
                        <button type="button" class="weekday-btn" data-day="3" onclick="toggleWeekday(3)">三</button>
                        <button type="button" class="weekday-btn" data-day="4" onclick="toggleWeekday(4)">四</button>
                        <button type="button" class="weekday-btn" data-day="5" onclick="toggleWeekday(5)">五</button>
                        <button type="button" class="weekday-btn" data-day="6" onclick="toggleWeekday(6)">六</button>
                    </div>
                </div>
                
                <div class="preview-section">
                    <label class="section-label">預覽將新增的日期</label>
                    <div id="datePreview" class="date-preview">請選擇日期區間和星期</div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="previewBatchDates()">🔍 預覽日期</button>
                <button class="btn btn-success" onclick="confirmBatchAdd()">✓ 確認新增</button>
                <button class="btn" onclick="closeBatchModal()" style="background: #cbd5e0; color: #2d3748;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 全域變數
        let events = [];
        let eventIdCounter = 1;
        let subItemIdCounter = 1;

        // GAS Web App URL - 請替換成你部署後的 URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwiYYWgKxmLRAEaE_pbp_kWyAzlRPcwYVQfvmJVamRJvosvt5wTTkvwebbFBkP8rMqX/exec';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadFromLocalStorage();
            renderEvents();
        });

        // 新增聚會
        function addEvent() {
            const event = {
                id: eventIdCounter++,
                date: new Date().toISOString().split('T')[0],
                name: '',
                category: '主日崇拜',
                subItems: [],
                showSub: false
            };
            events.push(event);
            renderEvents();
            saveToLocalStorage();
        }

        // 刪除聚會
        function deleteEvent(eventId) {
            if (confirm('確定要刪除此聚會嗎？')) {
                events = events.filter(e => e.id !== eventId);
                renderEvents();
                saveToLocalStorage();
            }
        }

        // 更新聚會資料
        function updateEvent(eventId, field, value) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                event[field] = value;
                saveToLocalStorage();
            }
        }

        // 切換子項目顯示
        function toggleSubItems(eventId) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                event.showSub = !event.showSub;
                renderEvents();
            }
        }

        // 新增子項目
        function addSubItem(eventId) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                event.subItems.push({
                    id: subItemIdCounter++,
                    date: new Date().toISOString().split('T')[0],
                    item: '',
                    description: ''
                });
                event.showSub = true;
                renderEvents();
                saveToLocalStorage();
            }
        }

        // 刪除子項目
        function deleteSubItem(eventId, subId) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                event.subItems = event.subItems.filter(s => s.id !== subId);
                renderEvents();
                saveToLocalStorage();
            }
        }

        // 更新子項目
        function updateSubItem(eventId, subId, field, value) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                const subItem = event.subItems.find(s => s.id === subId);
                if (subItem) {
                    subItem[field] = value;
                    saveToLocalStorage();
                }
            }
        }

        // 渲染所有聚會
        function renderEvents() {
            const container = document.getElementById('eventList');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = '<p class="loading">尚無聚會資料，請點擊「新增聚會」開始建立</p>';
                return;
            }

            events.forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-card';
                card.innerHTML = `
                    <div class="event-header">
                        <div class="input-group">
                            <label>日期</label>
                            <input type="date" value="${event.date}" 
                                   onchange="updateEvent(${event.id}, 'date', this.value)">
                        </div>
                        <div class="input-group">
                            <label>聚會名稱</label>
                            <input type="text" placeholder="輸入聚會名稱" value="${event.name}"
                                   onchange="updateEvent(${event.id}, 'name', this.value)">
                        </div>
                        <div class="input-group">
                            <label>聚會類別</label>
                            <select onchange="updateEvent(${event.id}, 'category', this.value)">
                                <option ${event.category === '主日崇拜' ? 'selected' : ''}>主日崇拜</option>
                                <option ${event.category === '禱告會' ? 'selected' : ''}>禱告會</option>
                                <option ${event.category === '小組聚會' ? 'selected' : ''}>小組聚會</option>
                                <option ${event.category === '特別聚會' ? 'selected' : ''}>特別聚會</option>
                                <option ${event.category === '服事' ? 'selected' : ''}>服事</option>
                                <option ${event.category === '其他' ? 'selected' : ''}>其他</option>
                            </select>
                        </div>
                        <button class="btn btn-danger btn-small" onclick="deleteEvent(${event.id})">刪除</button>
                    </div>
                    
                    <button class="btn toggle-sub btn-small" onclick="toggleSubItems(${event.id})">
                        ${event.showSub ? '▼' : '▶'} 細項事工 (${event.subItems.length})
                    </button>
                    
                    <div class="sub-items ${event.showSub ? '' : 'hidden'}">
                        <button class="btn btn-primary btn-small" onclick="addSubItem(${event.id})" 
                                style="margin-bottom: 15px;">➕ 新增細項</button>
                        ${event.subItems.map(sub => `
                            <div class="sub-item">
                                <div class="sub-item-row">
                                    <div class="input-group">
                                        <label>日期</label>
                                        <input type="date" value="${sub.date}"
                                               onchange="updateSubItem(${event.id}, ${sub.id}, 'date', this.value)">
                                    </div>
                                    <div class="input-group">
                                        <label>事工項目</label>
                                        <input type="text" placeholder="例: 詩歌敬拜"
                                               value="${sub.item}"
                                               onchange="updateSubItem(${event.id}, ${sub.id}, 'item', this.value)">
                                    </div>
                                    <div class="input-group">
                                        <label>內容描述</label>
                                        <textarea placeholder="詳細說明..."
                                                  onchange="updateSubItem(${event.id}, ${sub.id}, 'description', this.value)">${sub.description}</textarea>
                                    </div>
                                    <button class="btn btn-danger btn-small" 
                                            onclick="deleteSubItem(${event.id}, ${sub.id})">刪除</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 本地儲存
        function saveToLocalStorage() {
            localStorage.setItem('churchEvents', JSON.stringify(events));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('churchEvents');
            if (saved) {
                events = JSON.parse(saved);
                eventIdCounter = Math.max(...events.map(e => e.id), 0) + 1;
                const allSubIds = events.flatMap(e => e.subItems.map(s => s.id));
                subItemIdCounter = Math.max(...allSubIds, 0) + 1;
            }
        }

        // 匯出 Excel
        function exportToExcel() {
            if (events.length === 0) {
                alert('沒有資料可以匯出');
                return;
            }

            // 建立 CSV 內容
            let csv = '\uFEFF'; // UTF-8 BOM
            csv += '日期,聚會名稱,聚會類別,細項日期,事工項目,事工內容描述\n';

            events.forEach(event => {
                if (event.subItems.length === 0) {
                    csv += `${event.date},"${event.name}","${event.category}",,,\n`;
                } else {
                    event.subItems.forEach(sub => {
                        csv += `${event.date},"${event.name}","${event.category}",${sub.date},"${sub.item}","${sub.description}"\n`;
                    });
                }
            });

            // 下載檔案
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `教會行事曆_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 儲存到 GAS
        async function saveToGAS() {
            if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                alert('請先設定 GAS_URL');
                return;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'save',
                        data: events
                    })
                });
                alert('資料已儲存到雲端！');
            } catch (error) {
                console.error('儲存失敗:', error);
                alert('儲存失敗，請檢查網路連線');
            }
        }

        // 從 GAS 載入
        async function loadFromGAS() {
            if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                alert('請先設定 GAS_URL');
                return;
            }

            try {
                const response = await fetch(`${GAS_URL}?action=load`);
                const data = await response.json();
                if (data.success && data.events) {
                    events = data.events;
                    eventIdCounter = Math.max(...events.map(e => e.id), 0) + 1;
                    const allSubIds = events.flatMap(e => e.subItems.map(s => s.id));
                    subItemIdCounter = Math.max(...allSubIds, 0) + 1;
                    renderEvents();
                    saveToLocalStorage();
                    alert('資料已從雲端載入！');
                }
            } catch (error) {
                console.error('載入失敗:', error);
                alert('載入失敗，請檢查網路連線');
            }
        }

        // === 批量新增功能 ===
        let selectedWeekdays = new Set();
        let previewDates = [];

        // 開啟批量新增對話框
        function openBatchModal() {
            document.getElementById('batchModal').classList.remove('hidden');
            // 重置表單
            document.getElementById('batchStartDate').value = '';
            document.getElementById('batchEndDate').value = '';
            document.getElementById('batchName').value = '';
            document.getElementById('batchCategory').value = '主日崇拜';
            selectedWeekdays.clear();
            previewDates = [];
            
            // 重置星期按鈕
            document.querySelectorAll('.weekday-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById('datePreview').innerHTML = '請選擇日期區間和星期';
            document.getElementById('datePreview').classList.remove('has-dates');
        }

        // 關閉批量新增對話框
        function closeBatchModal() {
            document.getElementById('batchModal').classList.add('hidden');
        }

        // 切換星期選擇
        function toggleWeekday(day) {
            if (selectedWeekdays.has(day)) {
                selectedWeekdays.delete(day);
            } else {
                selectedWeekdays.add(day);
            }
            
            // 更新按鈕樣式
            const btn = document.querySelector(`.weekday-btn[data-day="${day}"]`);
            btn.classList.toggle('active');
        }

        // 預覽將要新增的日期
        function previewBatchDates() {
            const startDate = document.getElementById('batchStartDate').value;
            const endDate = document.getElementById('batchEndDate').value;
            
            if (!startDate || !endDate) {
                alert('請選擇開始和結束日期');
                return;
            }
            
            if (selectedWeekdays.size === 0) {
                alert('請至少選擇一個星期');
                return;
            }
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            if (start > end) {
                alert('開始日期不能晚於結束日期');
                return;
            }
            
            // 計算符合條件的日期
            previewDates = [];
            const current = new Date(start);
            
            while (current <= end) {
                const dayOfWeek = current.getDay();
                if (selectedWeekdays.has(dayOfWeek)) {
                    previewDates.push(new Date(current));
                }
                current.setDate(current.getDate() + 1);
            }
            
            // 顯示預覽
            const previewDiv = document.getElementById('datePreview');
            if (previewDates.length === 0) {
                previewDiv.innerHTML = '在選定的日期區間內，沒有符合條件的日期';
                previewDiv.classList.remove('has-dates');
            } else {
                const weekdayNames = ['日', '一', '二', '三', '四', '五', '六'];
                let html = `<div class="preview-count">共 ${previewDates.length} 個日期</div>`;
                
                previewDates.forEach(date => {
                    const dateStr = date.toISOString().split('T')[0];
                    const dayName = weekdayNames[date.getDay()];
                    html += `<span class="preview-date-item">${dateStr} (${dayName})</span>`;
                });
                
                previewDiv.innerHTML = html;
                previewDiv.classList.add('has-dates');
            }
        }

        // 確認批量新增
        function confirmBatchAdd() {
            const name = document.getElementById('batchName').value.trim();
            const category = document.getElementById('batchCategory').value;
            
            if (previewDates.length === 0) {
                alert('請先預覽日期，確認有可新增的日期');
                return;
            }
            
            // 批量建立聚會
            let addedCount = 0;
            previewDates.forEach(date => {
                const dateStr = date.toISOString().split('T')[0];
                
                // 檢查是否已存在相同日期和名稱的聚會（名稱可為空）
                const exists = events.some(e => e.date === dateStr && e.name === name);
                
                if (!exists) {
                    events.push({
                        id: eventIdCounter++,
                        date: dateStr,
                        name: name,
                        category: category,
                        subItems: [],
                        showSub: false
                    });
                    addedCount++;
                }
            });
            
            // 依日期排序
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            renderEvents();
            saveToLocalStorage();
            closeBatchModal();
            
            alert(`成功新增 ${addedCount} 個聚會！${previewDates.length - addedCount > 0 ? '\n(' + (previewDates.length - addedCount) + ' 個重複的聚會已略過)' : ''}`);
        }
    </script>
</body>
</html>
